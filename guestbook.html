<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 방명록 — Steady Music Quiz</title>
<style>
  :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a; --text: #e0e0e0; --dim: #888; --blue: #60a5fa; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.7; padding: 20px; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 0.9rem; margin-bottom: 24px; }
  .back { display: inline-block; margin-bottom: 16px; color: var(--blue); text-decoration: none; font-size: 0.9rem; }
  .back:hover { text-decoration: underline; }
  form { display: flex; gap: 8px; margin-bottom: 24px; }
  input[type="text"] { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.95rem; outline: none; }
  input[type="text"]:focus { border-color: var(--blue); }
  button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--blue); color: #fff; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .entries { list-style: none; }
  .entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; }
  .entry-text { font-size: 0.95rem; }
  .entry-time { font-size: 0.78rem; color: var(--dim); margin-top: 4px; }
  .empty { color: var(--dim); text-align: center; padding: 40px 0; font-size: 0.95rem; }
</style>
</head>
<body>

<a class="back" href="index-ko.html">← 커리큘럼으로 돌아가기</a>
<h1>✏️ 방명록</h1>
<p class="subtitle">자유롭게 한마디 남겨주세요!</p>

<form id="gb-form">
  <input type="text" id="gb-input" placeholder="메시지를 입력하세요..." maxlength="200" required>
  <button type="submit" id="gb-btn">남기기</button>
</form>

<div id="gb-list"></div>

<script>
const API = '/api/guestbook';
const listEl = document.getElementById('gb-list');
const btn = document.getElementById('gb-btn');

async function load() {
  try {
    const res = await fetch(API);
    const entries = await res.json();
    if (!entries.length) {
      listEl.innerHTML = '<p class="empty">아직 글이 없어요. 첫 방명록을 남겨보세요! 🎶</p>';
      return;
    }
    listEl.innerHTML = '<ul class="entries">' + entries.map(e =>
      '<li class="entry"><div class="entry-text">' + e.text + '</div><div class="entry-time">' + e.time + '</div></li>'
    ).join('') + '</ul>';
  } catch {
    listEl.innerHTML = '<p class="empty">불러오기 실패 😢</p>';
  }
}

document.getElementById('gb-form').addEventListener('submit', async e => {
  e.preventDefault();
  const input = document.getElementById('gb-input');
  const text = input.value.trim();
  if (!text) return;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    input.value = '';
    await load();
  } catch {}
  btn.disabled = false;
  btn.textContent = '남기기';
});

load();
</script>
</body>
</html>
